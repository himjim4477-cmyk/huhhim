<style>
body {
  margin: 0;
  background: #111;
  color: #fff;
  font-family: Arial;
}

/* header */
header {
  display: flex;
  align-items: center;
  background: #000;
  padding: 15px;
}

.menu-btn {
  font-size: 25px;
  cursor: pointer;
  margin-right: 15px;
}

/* sidebar */
.sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #000;
  transition: 0.3s;
  padding-top: 20px;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}

/* page */
.page { display: none; }
.active { display: block; }

/* 🔥 ป้าย 1920x480 */
.banner img {
  width: 100%;
  height: 1920 / 480 px;
  object-fit: cover;
}

/* หมวด */
.section {
  padding: 10px;
}

.section h3 {
  margin-left: 15px;
}

/* 🔥 แถวเลื่อน */
.album-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 10px 15px;

  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.album-row::-webkit-scrollbar { display: none; }

/* 🔥 อัลบั้ม 340x440 */
.album-card {
  width: 340px;
  height: 440px;
  flex-shrink: 0;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}

.album-card img {
  width: 100%;
  height: 80%;
  object-fit: cover;
}

.album-card p {
  height: 20%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap: 10px;
  padding: 15px;
}

.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  cursor: pointer;
}

/* modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
}

.btn {
  position: absolute;
  top: 50%;
  font-size: 40px;
  cursor: pointer;
}

.prev { left: 20px; }
.next { right: 20px; }

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
}

</style>
<style>
  /* 🔥 แถบแนวนอน */
.app-bar {
  display: flex;
  gap: 10px;
  padding: 10px 15px;
  overflow-x: auto;
}

/* ซ่อน scrollbar */
.app-bar::-webkit-scrollbar {
  display: none;
}

/* 🔥 กล่องเล็กยาว */
.app-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #222;
  padding: 8px 15px;
  border-radius: 20px;
  text-decoration: none;
  color: white;
  flex-shrink: 0;
  transition: 0.3s;
}

.app-item:hover {
  background: #333;
}

/* ไอคอน */
.app-item img {
  width: 20px;
  height: 20px;
}

/* ชื่อ */
.app-item span {
  font-size: 14px;
}
</style>

</head>

function toggleMenu(){
  sidebar.style.left=(sidebar.style.left==="0px")?"-250px":"0px";
}

function goPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  sidebar.style.left="-250px";
  title.innerText=id==="home"?"หน้าหลัก":"อัลบั้ม";
}

function openAlbum(id,name){
  goPage(id);

  // เพิ่ม shortcut
  if(!document.getElementById("link-"+id)){
    const a=document.createElement("a");
    a.id="link-"+id;
    a.innerText=name;
    a.onclick=()=>goPage(id);
    shortcuts.appendChild(a);
  }
}

// 🔥 ลากเลื่อน
document.querySelectorAll('.album-row').forEach(row=>{
  let isDown=false,startX,scrollLeft;

  row.addEventListener('mousedown',e=>{
    isDown=true;
    startX=e.pageX-row.offsetLeft;
    scrollLeft=row.scrollLeft;
  });

  row.addEventListener('mouseup',()=>isDown=false);
  row.addEventListener('mouseleave',()=>isDown=false);

  row.addEventListener('mousemove',e=>{
    if(!isDown) return;
    e.preventDefault();
    const x=e.pageX-row.offsetLeft;
    row.scrollLeft=scrollLeft-(x-startX)*2;
  });
});

function preloadImages(arr) {
  arr.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}
